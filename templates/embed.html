<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { margin: 0; font-family: sans-serif; }
        .embed-content { padding: 1rem; max-width: 600px; }
    </style>
</head>
<body>
    <div class="embed-content">
        <h2>{{ page.title }}</h2>
        <p>{{ page.summary }}</p>
        <a href="{{ get_url(path=page.path) }}">Read full article</a>
    </div>
</body>
</html>
